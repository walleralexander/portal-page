services:
  portal:
    build: .
    container_name: portal-page
    ports:
      - "${PORT:-80}:80"
    volumes:
      # Mount config directory - edit config/links.yaml to update the portal
      - ./config:/data/config:ro
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NGINX_HOST=${NGINX_HOST:-localhost}
    restart: unless-stopped
    # ponytail: liveness via /proc listen-socket (80=0050). no http client/auth/wget dep.
    healthcheck:
      test: ["CMD-SHELL", "awk '$4==\"0A\" && $2 ~ /:0050$/{f=1} END{exit !f}' /proc/net/tcp /proc/net/tcp6"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - dockernet
networks:
  dockernet:
    external: true
